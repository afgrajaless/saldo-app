name: CI

# Verifica backend (build + tests) y app (analyze) en cada push y PR.
on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**', 'refactor/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar (nest build)
        run: npm run build

      - name: Tests
        run: npm test

  app:
    name: App (flutter analyze)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Analizar
        run: flutter analyze
